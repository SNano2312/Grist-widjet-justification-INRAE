<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Widget — Tableau de bord</title>
  <script src="https://docs.getgrist.com/grist-plugin-api.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 14px; color: #1a1a1a; background: #fff; line-height: 1.6;
    }
    .wrap { padding: 1.25rem; max-width: 900px; }
    h1 { font-size: 15px; font-weight: 600; margin-bottom: 1rem; color: #1a1a1a; }

    /* Grille des étapes */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 10px;
      margin-bottom: 1.25rem;
    }

    .etape-card {
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      padding: 12px 14px;
      cursor: default;
      transition: box-shadow .15s, border-color .15s;
      position: relative;
    }

    /* États */
    .etape-card.valide {
      border-color: #a5d6a7;
      background: #f1f8f2;
    }
    .etape-card.active {
      border-color: #1565c0;
      background: #e8f0fe;
      box-shadow: 0 0 0 2px #1565c020;
    }
    .etape-card.bloque {
      border-color: #e0e0e0;
      background: #fafafa;
      opacity: .6;
    }
    .etape-card.erreur {
      border-color: #ef9a9a;
      background: #fff5f5;
    }
    .etape-card.ignore {
      border-color: #e0e0e0;
      background: #fafafa;
      opacity: .5;
    }

    .etape-num {
      font-size: 10px;
      color: #aaa;
      margin-bottom: 2px;
      font-weight: 500;
      letter-spacing: .5px;
      text-transform: uppercase;
    }
    .etape-title {
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 4px;
    }
    .etape-card.valide  .etape-title { color: #2e7d32; }
    .etape-card.active  .etape-title { color: #1565c0; }
    .etape-card.bloque  .etape-title { color: #999; }
    .etape-card.erreur  .etape-title { color: #b71c1c; }
    .etape-card.ignore  .etape-title { color: #aaa; }

    .etape-statut {
      font-size: 11px;
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .etape-card.valide  .etape-statut { color: #2e7d32; }
    .etape-card.active  .etape-statut { color: #1565c0; }
    .etape-card.bloque  .etape-statut { color: #aaa; }
    .etape-card.erreur  .etape-statut { color: #b71c1c; }
    .etape-card.ignore  .etape-statut { color: #aaa; }

    /* Icônes statut */
    .icon { font-size: 13px; }

    /* Flèche "active" */
    .etape-card.active::after {
      content: '▼ Étape en cours';
      position: absolute;
      bottom: -1px;
      right: 10px;
      font-size: 9px;
      color: #1565c0;
      font-weight: 600;
      letter-spacing: .3px;
    }

    /* Barre de progression globale */
    .progress-section {
      margin-bottom: 1.25rem;
    }
    .progress-header {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      color: #666;
      margin-bottom: 5px;
    }
    .progress-wrap {
      background: #e0e0e0;
      border-radius: 4px;
      height: 6px;
      overflow: hidden;
    }
    .progress-bar {
      height: 100%;
      background: #1565c0;
      border-radius: 4px;
      transition: width .5s ease;
    }

    /* Encadré "étape suivante" */
    .next-step {
      border: 1px solid #1565c0;
      border-radius: 8px;
      padding: 12px 16px;
      background: #e8f0fe;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }
    .next-step-label {
      font-size: 11px;
      color: #1565c0;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .5px;
      margin-bottom: 2px;
    }
    .next-step-title {
      font-size: 14px;
      font-weight: 600;
      color: #1a1a1a;
    }
    .next-step-desc {
      font-size: 12px;
      color: #555;
      margin-top: 2px;
    }

    /* Encadré "tout terminé" */
    .all-done {
      border: 1px solid #a5d6a7;
      border-radius: 8px;
      padding: 12px 16px;
      background: #f1f8f2;
      text-align: center;
      font-size: 13px;
      color: #2e7d32;
      font-weight: 500;
    }

    /* Timestamp */
    .footer {
      margin-top: 1rem;
      font-size: 11px;
      color: #bbb;
      text-align: right;
    }

    .spinner {
      display: inline-block; width: 12px; height: 12px;
      border: 2px solid #ccc; border-top-color: #1565c0;
      border-radius: 50%; animation: spin .7s linear infinite;
      vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
<div class="wrap">

  <h1>Tableau de bord — Matrice de justification</h1>

  <!-- Barre de progression globale -->
  <div class="progress-section">
    <div class="progress-header">
      <span id="progress-label">Chargement…</span>
      <span id="progress-pct">—</span>
    </div>
    <div class="progress-wrap">
      <div class="progress-bar" id="progress-bar" style="width:0%"></div>
    </div>
  </div>

  <!-- Grille des étapes -->
  <div class="grid" id="etapes-grid">
    <div style="color:#aaa;font-size:13px"><span class="spinner"></span> Chargement…</div>
  </div>

  <!-- Étape suivante recommandée -->
  <div id="next-step-wrap" style="display:none">
    <div class="next-step">
      <div>
        <div class="next-step-label">↓ Étape suivante — descendez sur cette page</div>
        <div class="next-step-title" id="next-step-title">—</div>
        <div class="next-step-desc" id="next-step-desc">—</div>
      </div>
    </div>
  </div>

  <div id="all-done-wrap" style="display:none">
    <div class="all-done">✓ Toutes les étapes sont complétées.</div>
  </div>

  <div class="footer" id="footer-ts">—</div>

</div>

<script>
/*
 * DÉFINITION DES ÉTAPES
 * Ordre, clé CONFIG, titre affiché, description courte
 */
const ETAPES = [
  {
    key:   'lancement',
    num:   1,
    titre: 'Lancement de la matrice',
    desc:  'Initialisation, justifications précédentes, vérification JDP 2025',
  },
  {
    key:   'jdp2025',
    num:   2,
    titre: 'Validation JDP 2025',
    desc:  'Contrôle exercice, centre de coûts, confirmation',
    ignorable: true, // peut être en statut "ignore"
  },
  {
    key:   'jdp2026',
    num:   3,
    titre: 'Validation JDP 2026',
    desc:  'Contrôle exercice, centre de coûts, confirmation',
  },
  {
    key:   'missions',
    num:   4,
    titre: 'Import Missions',
    desc:  'Missions 2025 et 2026',
  },
  {
    key:   'pi',
    num:   5,
    titre: 'Import PI',
    desc:  'Prestations internes',
  },
  {
    key:   'cda',
    num:   6,
    titre: 'Import CDA',
    desc:  'Commandes d\'achat',
  },
  {
    key:   'sf',
    num:   7,
    titre: 'Import SF',
    desc:  'Services faits',
  },
  {
    key:   'factures',
    num:   8,
    titre: 'Import Factures',
    desc:  'Factures fournisseurs',
  },
  {
    key:   'rappro',
    num:   9,
    titre: 'Import Rapprochement',
    desc:  'Rapprochement comptable',
  },
  {
    key:   'export',
    num:   10,
    titre: 'Export SIFAC',
    desc:  'Génération des fichiers de sortie',
  },
  {
    key:   'nettoyage',
    num:   11,
    titre: 'Nettoyage',
    desc:  'Remise à zéro des tables',
  },
];

const TABLE_CONFIG   = 'CONFIG';
const POLL_INTERVAL  = 5000; // rafraîchissement toutes les 5 secondes

let lastTs = null;

/* ── Helpers ── */
const str = v => (v === null || v === undefined) ? '' : String(v).trim();

async function fetchConfig() {
  try {
    const t = await grist.docApi.fetchTable(TABLE_CONFIG);
    const ids    = t.id     || [];
    const etapes = t.etape  || [];
    const statuts= t.statut || [];
    const dates  = t.updated_at || [];
    const map = {};
    ids.forEach((_, i) => {
      map[str(etapes[i])] = { statut: str(statuts[i]), updated_at: str(dates[i]) };
    });
    return map;
  } catch(_) {
    return {}; // CONFIG absente → toutes les étapes en attente
  }
}

function statutToClass(statut) {
  if (statut === 'valide')       return 'valide';
  if (statut === 'en_cours')     return 'active';
  if (statut === 'ignore')       return 'ignore';
  if (statut === 'a_recharger')  return 'erreur';
  if (statut === 'erreur')       return 'erreur';
  return 'bloque';
}

function statutToIcon(statut) {
  if (statut === 'valide')       return '✓';
  if (statut === 'en_cours')     return '◉';
  if (statut === 'ignore')       return '—';
  if (statut === 'a_recharger')  return '⚠';
  if (statut === 'erreur')       return '✕';
  return '○';
}

function statutToLabel(statut) {
  if (statut === 'valide')       return 'Complété';
  if (statut === 'en_cours')     return 'En cours';
  if (statut === 'ignore')       return 'Ignoré';
  if (statut === 'a_recharger')  return 'À recharger';
  if (statut === 'erreur')       return 'Erreur';
  return 'En attente';
}

/* ── Rendu ── */
function render(configMap) {
  const grid = document.getElementById('etapes-grid');
  grid.innerHTML = '';

  let nbValides   = 0;
  let nextEtape   = null;
  let lastUpdated = '';

  ETAPES.forEach((etape, idx) => {
    const cfg    = configMap[etape.key] || {};
    const statut = cfg.statut || '';
    const cls    = statutToClass(statut);

    // Compte les complétées (valide ou ignore)
    if (statut === 'valide' || statut === 'ignore') nbValides++;

    // Détermine la prochaine étape active
    if (!nextEtape && cls !== 'valide' && cls !== 'ignore') {
      nextEtape = { ...etape, statut, cls };
    }

    // Dernier horodatage
    if (cfg.updated_at && cfg.updated_at > lastUpdated) {
      lastUpdated = cfg.updated_at;
    }

    // Détermine si l'étape est accessible
    // (la première est toujours accessible,
    //  les suivantes nécessitent que la précédente soit valide/ignore)
    let accessible = idx === 0;
    if (idx > 0) {
      const prevCfg    = configMap[ETAPES[idx - 1].key] || {};
      const prevStatut = prevCfg.statut || '';
      accessible = prevStatut === 'valide' || prevStatut === 'ignore';
    }
    const classFinal = accessible ? cls : 'bloque';

    // Construit la carte
    const card = document.createElement('div');
    card.className = 'etape-card ' + classFinal;
    card.innerHTML = `
      <div class="etape-num">Étape ${etape.num}</div>
      <div class="etape-title">${etape.titre}</div>
      <div class="etape-statut">
        <span class="icon">${statutToIcon(statut)}</span>
        <span>${statutToLabel(statut)}</span>
      </div>`;
    grid.appendChild(card);
  });

  // Barre de progression
  const total = ETAPES.length;
  const pct   = Math.round((nbValides / total) * 100);
  document.getElementById('progress-bar').style.width = pct + '%';
  document.getElementById('progress-pct').textContent = pct + '%';
  document.getElementById('progress-label').textContent =
    nbValides + ' / ' + total + ' étape' + (nbValides > 1 ? 's' : '') + ' complétée' + (nbValides > 1 ? 's' : '');

  // Encadré "étape suivante"
  if (nextEtape && nextEtape.cls !== 'valide' && nextEtape.cls !== 'ignore') {
    document.getElementById('next-step-title').textContent = nextEtape.titre;
    document.getElementById('next-step-desc').textContent  = nextEtape.desc;
    document.getElementById('next-step-wrap').style.display = 'block';
    document.getElementById('all-done-wrap').style.display  = 'none';
  } else {
    document.getElementById('next-step-wrap').style.display = 'none';
    document.getElementById('all-done-wrap').style.display  = 'block';
  }

  // Timestamp dernier rafraîchissement
  const now = new Date();
  const ts  = now.getHours().toString().padStart(2,'0') + ':' +
              now.getMinutes().toString().padStart(2,'0') + ':' +
              now.getSeconds().toString().padStart(2,'0');
  document.getElementById('footer-ts').textContent =
    'Dernière mise à jour : ' + ts +
    (lastUpdated ? ' — Dernière action : ' + lastUpdated.slice(11, 19) : '');
}

/* ── Polling ── */
async function refresh() {
  const map = await fetchConfig();
  render(map);
}

async function boot() {
  grist.ready({ requiredAccess: 'full' });
  await refresh();
  setInterval(refresh, POLL_INTERVAL);
}

boot();
</script>
</body>
</html>
